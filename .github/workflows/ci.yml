name: Deploy forte.farpa.ai

on:
  push:
    branches: [main]

jobs:
  deploy-pages:
    name: Deploy Cloudflare Pages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Deploy Pages
        run: wrangler pages deploy . --project-name forte-farpa-ai --branch main
        env:
          CLOUDFLARE_API_TOKEN:  ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  deploy-worker:
    name: Deploy forte-worker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: workers/forte-worker/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: workers/forte-worker

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken:         ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: workers/forte-worker

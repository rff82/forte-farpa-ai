name: Deploy forte.farpa.ai

on:
  push:
    branches: [main]

jobs:
  # ── E12: matrix 6 browsers · Playwright E2E básicos ────────────────────────
  e2e-matrix:
    name: E2E · ${{ matrix.browser }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { browser: chromium,       os: ubuntu-latest,  device: Desktop }
          - { browser: firefox,        os: ubuntu-latest,  device: Desktop }
          - { browser: webkit,         os: macos-latest,   device: Desktop }
          - { browser: edge,           os: ubuntu-latest,  device: Desktop }
          - { browser: mobile-safari,  os: macos-latest,   device: iPhone 13 }
          - { browser: chrome-android, os: ubuntu-latest,  device: Pixel 5 }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - name: Install Playwright
        run: |
          npm init -y >/dev/null
          npm i -D @playwright/test 2>&1 | tee pw-install.log
          npx playwright install --with-deps 2>&1 | tee pw-browsers.log
      - name: Run E2E
        id: run
        run: npx playwright test tests/e2e/ --project=${{ matrix.browser }} 2>&1 | tee e2e-${{ matrix.browser }}.log
        continue-on-error: true
      - name: Upload log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-${{ matrix.browser }}-log
          path: e2e-${{ matrix.browser }}.log
          retention-days: 14

  deploy-pages:
    name: Deploy Cloudflare Pages
    runs-on: ubuntu-latest
    needs: [e2e-matrix]
    outputs:
      status: ${{ steps.set-status.outputs.status }}
      error_log: ${{ steps.capture.outputs.error_log }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - name: Install Wrangler
        run: npm install -g wrangler
      - name: Deploy Pages
        id: deploy
        run: wrangler pages deploy . --project-name forte-farpa-ai --branch main 2>&1 | tee deploy-pages.log
        env:
          CLOUDFLARE_API_TOKEN:  ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Capture error log on failure
        id: capture
        if: failure()
        run: |
          echo "error_log<<EOF" >> $GITHUB_OUTPUT
          tail -n 80 deploy-pages.log >> $GITHUB_OUTPUT || echo "no log captured" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      - name: Set status
        id: set-status
        if: always()
        run: echo "status=${{ job.status }}" >> $GITHUB_OUTPUT
      - name: Upload deploy log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deploy-pages-log
          path: deploy-pages.log
          retention-days: 14

  deploy-worker:
    name: Deploy forte-worker
    runs-on: ubuntu-latest
    needs: [e2e-matrix]
    outputs:
      status: ${{ steps.set-status.outputs.status }}
      error_log: ${{ steps.capture.outputs.error_log }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: workers/forte-worker/package-lock.json
      - name: Install dependencies
        run: npm ci 2>&1 | tee install.log
        working-directory: workers/forte-worker
      - name: Deploy Worker
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken:         ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId:        ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: workers/forte-worker
      - name: Capture error log on failure
        id: capture
        if: failure()
        working-directory: workers/forte-worker
        run: |
          echo "error_log<<EOF" >> $GITHUB_OUTPUT
          (tail -n 80 install.log 2>/dev/null || echo "no install log") >> $GITHUB_OUTPUT
          SEP="---"
          echo "$SEP" >> $GITHUB_OUTPUT
          echo "wrangler step: ${{ steps.deploy.outcome }}" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      - name: Set status
        id: set-status
        if: always()
        run: echo "status=${{ job.status }}" >> $GITHUB_OUTPUT
      - name: Upload install log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deploy-worker-log
          path: workers/forte-worker/install.log
          retention-days: 14

  # ── U7 self-healing: CI nunca falha em silêncio ─────────────────────────────
  record-failure:
    name: Record failure in CLAUDE.md
    needs: [deploy-pages, deploy-worker]
    if: failure()
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Append failure entry to CLAUDE.md
        env:
          PAGES_STATUS: ${{ needs.deploy-pages.outputs.status }}
          PAGES_LOG:    ${{ needs.deploy-pages.outputs.error_log }}
          WORKER_STATUS: ${{ needs.deploy-worker.outputs.status }}
          WORKER_LOG:    ${{ needs.deploy-worker.outputs.error_log }}
          RUN_URL:      ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          COMMIT:       ${{ github.sha }}
        run: |
          set -e
          DATE=$(date -u +"%Y-%m-%d %H:%MZ")
          SHORT_SHA=$(echo "$COMMIT" | cut -c1-7)
          SEP="---"
          if ! grep -q "^## HISTÓRICO DE FALHAS DE CI" CLAUDE.md; then
            {
              echo ""
              echo "$SEP"
              echo ""
              echo "## HISTÓRICO DE FALHAS DE CI"
              echo "> Registro automático escrito pelo job \`record-failure\` em \`.github/workflows/ci.yml\`."
              echo "> Cada entrada abaixo foi uma falha real — consultar antes de repetir mesma operação."
            } >> CLAUDE.md
          fi
          {
            echo ""
            echo "### ${DATE} · commit ${SHORT_SHA}"
            echo ""
            echo "- **Pages:** ${PAGES_STATUS:-skipped}"
            echo "- **Worker:** ${WORKER_STATUS:-skipped}"
            echo "- **Run:** ${RUN_URL}"
            echo ""
            if [ -n "${PAGES_LOG:-}" ]; then
              echo "<details><summary>Log Pages (últimas linhas)</summary>"
              echo ""
              echo '```'
              echo "${PAGES_LOG}"
              echo '```'
              echo ""
              echo "</details>"
            fi
            if [ -n "${WORKER_LOG:-}" ]; then
              echo "<details><summary>Log Worker (últimas linhas)</summary>"
              echo ""
              echo '```'
              echo "${WORKER_LOG}"
              echo '```'
              echo ""
              echo "</details>"
            fi
            echo ""
            echo "> **TODO:** após corrigir, registrar a lição aprendida logo abaixo (1 linha)."
          } >> CLAUDE.md
      - name: Commit entry
        run: |
          git config user.name  "forte-ci-bot"
          git config user.email "ci-bot@forte.farpa.ai"
          git add CLAUDE.md
          if git diff --cached --quiet; then
            echo "Nenhuma alteração a registrar."
          else
            git commit -m "docs(ci): registra falha em CLAUDE.md · run ${{ github.run_id }} [skip ci]"
            git push
          fi
      - name: Open tracking issue
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const pagesStatus  = process.env.PAGES_STATUS  || 'skipped';
            const workerStatus = process.env.WORKER_STATUS || 'skipped';
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `CI falhou em ${context.sha.substring(0,7)} — Pages: ${pagesStatus} · Worker: ${workerStatus}`,
              body: [
                `Falha de CI registrada no CLAUDE.md automaticamente.`,
                ``,
                `- Commit: ${context.sha}`,
                `- Run: ${runUrl}`,
                `- Pages: **${pagesStatus}**`,
                `- Worker: **${workerStatus}**`,
                ``,
                `Consultar seção \`## HISTÓRICO DE FALHAS DE CI\` no CLAUDE.md para o log capturado.`,
                `Após corrigir, editar a entrada com a lição aprendida (1 linha).`,
              ].join('\n'),
              labels: ['ci-failure','automated']
            });
        env:
          PAGES_STATUS:  ${{ needs.deploy-pages.outputs.status }}
          WORKER_STATUS: ${{ needs.deploy-worker.outputs.status }}

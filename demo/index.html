<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Demo — farpa Forte</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../tokens.css">
  <link rel="stylesheet" href="../themes.css">
  <link rel="stylesheet" href="../components.css">
  <link rel="stylesheet" href="../logo-system.css">
  <link rel="stylesheet" href="../forte.css">
</head>
<body style="--logo-mark-bg: var(--forte-accent);">
  <header class="topbar" style="border-bottom:1px solid var(--forte-border);">
    <div class="topbar-left">
      <a href="../index.html" class="farpa-logo">
        <div class="farpa-logo-mark farpa-logo-mark--md">F</div>
        <div class="farpa-logo-text">
          <span class="farpa-logo-wordmark">farpa</span>
          <span class="farpa-logo-sublabel" data-i18n="demo.badge">Demo</span>
        </div>
      </a>
    </div>
    <div class="topbar-right">
      <select id="lang-select" aria-label="Idioma / Language">
        <option value="pt-BR">PT-BR</option>
        <option value="en">EN</option>
      </select>
      <button id="btn-alto-contraste" aria-label="Ativar alto contraste"><span data-icon="contrast"></span> <span data-i18n="ui.contrast">Contraste</span></button>
      <a href="../login.html" class="btn btn-primary btn-sm" data-i18n="demo.cta_real">Criar conta real</a>
    </div>
  </header>

  <main class="page-content" style="max-width:1200px;margin:0 auto;padding:var(--space-8) var(--space-5);">
    <div class="badge badge-orange" style="margin-bottom:var(--space-4);" data-i18n="demo.fictional">Dados fictícios · Nenhum dado real</div>
    <h1 style="font-size:var(--text-4xl);margin-bottom:var(--space-3);" data-i18n="demo.title">Veja o forte por dentro</h1>
    <p style="color:var(--forte-text-secondary);max-width:640px;margin-bottom:var(--space-6);" data-i18n="demo.subtitle">Este é um ambiente de demonstração com alunos, sessões e pagamentos simulados. Nada aqui é persistido.</p>

    <div class="stats-grid">
      <div class="stat-card stat-card-accent">
        <div class="stat-header"><span class="stat-label" data-i18n="demo.stat_students">Alunos Ativos</span></div>
        <div class="stat-value">12</div>
      </div>
      <div class="stat-card">
        <div class="stat-header"><span class="stat-label" data-i18n="demo.stat_sessions">Sessões Hoje</span></div>
        <div class="stat-value">5</div>
      </div>
      <div class="stat-card">
        <div class="stat-header"><span class="stat-label" data-i18n="demo.stat_revenue">Receita no Mês</span></div>
        <div class="stat-value">R$ 4.800</div>
      </div>
      <div class="stat-card">
        <div class="stat-header"><span class="stat-label" data-i18n="demo.stat_pending">Pendentes</span></div>
        <div class="stat-value">2</div>
      </div>
    </div>

    <section style="margin-top:var(--space-8);">
      <h2 style="font-size:var(--text-2xl);margin-bottom:var(--space-4);" data-i18n="demo.students_title">Alunos fictícios</h2>
      <div class="card"><div class="card-body" id="demo-students"></div></div>
    </section>
  </main>

  <script src="../icons.js"></script>
  <script src="../theme-engine.js"></script>
  <script src="../i18n.js"></script>
  <script>
    // Seed 100% fictício — NUNCA toca D1 real
    const SEED = [
      { name: 'Ana Silva (demo)',    objective: 'Emagrecimento',  status: 'ativo' },
      { name: 'Carlos Lima (demo)',  objective: 'Ganho de massa', status: 'ativo' },
      { name: 'Fernanda Rocha (demo)', objective: 'Condicionamento', status: 'ativo' },
    ];
    document.getElementById('demo-students').innerHTML = SEED.map(a => `
      <div style="display:flex;align-items:center;gap:var(--space-3);padding:var(--space-3) 0;border-bottom:1px solid var(--forte-border);">
        <div class="avatar">${a.name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase()}</div>
        <div style="flex:1;">
          <div style="font-weight:600;">${a.name}</div>
          <div style="font-size:var(--text-xs);color:var(--forte-text-muted);">${a.objective}</div>
        </div>
        <span class="badge badge-success">${a.status}</span>
      </div>`).join('');
  </script>
</body>
</html>
